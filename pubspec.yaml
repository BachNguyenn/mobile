name: mobile
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  flutter_riverpod: 2.5.1
  google_mlkit_digital_ink_recognition: ^0.14.2
  path_provider: ^2.1.5
  equatable: ^2.0.8
  drift: ^2.32.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path: ^1.9.1
  state_notifier: ^1.0.0
  workmanager: ^0.9.0+3
  google_sign_in: 6.2.1
  flutter_local_notifications: ^21.0.0
  flutter_dotenv: ^6.0.1
  http: ^1.1.0
  path_drawing: ^1.0.1
  google_fonts: ^8.0.2
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.1
  build_runner: ^2.14.0

flutter:
  uses-material-design: true
